<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Compte Activé</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #f5c518; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #f5c518;">Félicitations !</h2>
        
        <p th:text="#{email.activation.greeting(${firstName})}">Bonjour,</p>
        
        <p th:text="#{email.activation.body}">Votre compte a été validé.</p>
        
        <a th:href="${loginUrl}" class="btn">Se connecter</a>
        
        <div class="footer">
            <p>L'équipe SmartBooking</p>
        </div>
    </div>
</body>
</html>
