<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{email.passwordreset.subject}">Password reset</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="margin-bottom: 24px;">
    <p th:text="#{email.passwordreset.greeting}">Hello,</p>
    <p th:text="#{email.passwordreset.body}">You have requested a password reset.</p>
    <p>
      <span th:text="#{email.passwordreset.linkText}">Click the link below</span>:
    </p>
    <p style="margin: 20px 0;">
      <a th:href="${resetUrl}" th:text="${resetUrl}" style="color: #0066cc; word-break: break-all;">Link</a>
    </p>
    <p style="color: #666; font-size: 14px;" th:text="#{email.passwordreset.expiry}">This link expires in 1 hour.</p>
    <p style="color: #666; font-size: 14px;" th:text="#{email.passwordreset.ignore}">If you did not request this, please ignore this email.</p>
  </div>
  <p style="font-size: 12px; color: #999;" th:text="#{email.register.footer}">SmartBooking</p>
</body>
</html>
