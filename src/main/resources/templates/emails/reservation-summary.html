<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{email.reservation.subject}">Reservation confirmed</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="margin-bottom: 24px;">
    <p th:text="#{email.reservation.greeting(${firstName})}">Hello,</p>
    <p th:text="#{email.reservation.intro}">Your reservation has been confirmed.</p>
    <table style="width: 100%; border-collapse: collapse; margin: 20px 0;" border="1" cellpadding="8" cellspacing="0">
      <thead>
        <tr style="background-color: #f5f5f5;">
          <th style="text-align: left;" th:text="#{email.reservation.itemShow}">Show</th>
          <th style="text-align: left;" th:text="#{email.reservation.itemDate}">Date</th>
          <th style="text-align: right;" th:text="#{email.reservation.itemPrice}">Unit price</th>
          <th style="text-align: center;" th:text="#{email.reservation.itemQty}">Qty</th>
          <th style="text-align: right;" th:text="#{email.reservation.total}">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td th:text="${item.showTitle}">Show</td>
          <td th:text="${item.date}">Date</td>
          <td style="text-align: right;" th:text="${item.unitPrice}">Price</td>
          <td style="text-align: center;" th:text="${item.quantity}">1</td>
          <td style="text-align: right;" th:text="${item.lineTotal}">Total</td>
        </tr>
      </tbody>
    </table>
    <p style="font-weight: bold; text-align: right;">
      <span th:text="#{email.reservation.total}">Total</span>: <span th:text="${total}">0.00 €</span>
    </p>
  </div>
  <p style="font-size: 12px; color: #999;" th:text="#{email.reservation.footer}">The SmartBooking team</p>
</body>
</html>
