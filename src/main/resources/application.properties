# --- CONFIGURATION SWAGGER / OPENAPI (Ton travail) ---
# Désactive l'intégration HATEOAS dans Swagger pour éviter les crashs de version
springdoc.hateoas.enabled=false
# Dit à Swagger/OpenAPI de ne scanner et d'exposer QUE les routes B2B
springdoc.paths-to-match=/api/public/**

# --- CONFIGURATION TRANSLATION API (Leur travail) ---
# Translation API (DeepL) - leave empty to disable
app.translation.enabled=true
app.translation.api-key=
app.translation.api-url=https://api-free.deepl.com/v2/translate
# Usage limits (0 = no limit). DeepL Free: 500,000 chars/month
app.translation.daily-limit=0
app.translation.monthly-limit=0
# Cache for repeated translations
app.translation.cache-enabled=true
app.translation.cache-max-size=1000
app.translation.cache-ttl-hours=24

# Désactive le vérificateur de compatibilité Spring Cloud si nécessaire
spring.cloud.compatibility-verifier.enabled=false

# Google Cloud Translation API (pour les commentaires en direct)
# La clé est récupérée depuis les variables d'environnement pour la sécurité
google.cloud.translation.api-key=${GOOGLE_TRANSLATION_API_KEY:}
google.cloud.translation.api-url=https://translation.googleapis.com/language/translate/v2
