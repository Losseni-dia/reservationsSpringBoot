spring.application.name=smartbooking

# i18n - MessageSource for API error messages
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.datasource.url=jdbc:mysql://localhost:3306/reservations?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Brussels&useLegacyDatetimeCode=false
spring.application.frontend-url=http://localhost:3000
spring.datasource.username=root
spring.datasource.password=root

# Enable use of hidden input to override HTML method in form (put & delete)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.mvc.hiddenmethod.filter.enabled=true
spring.main.allow-bean-definition-overriding=true

# Indique à Hibernate de mettre à jour le schéma automatiquement


# Emplacement du dossier (relatif à la racine du projet)
upload.path=uploads

# Sécurité : Limiter la taille des images à 5Mo
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# On laisse Flyway gérer la structure, pas Hibernate
spring.jpa.hibernate.ddl-auto=update

spring.flyway.out-of-order=true

logging.level.org.springframework.web=DEBUG
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

